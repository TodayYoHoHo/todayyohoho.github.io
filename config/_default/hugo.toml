######################## default configuration ####################
# The base URL of your site (required).
baseURL = "https://todayyohoho.github.io/"
# Title of your site (required).
title = "我的博客"
# Default time zone for time stamps
timeZone = "Asia/Shanghai"
# post excerpt
summaryLength = 10
# disable language
disableLanguages = []
# CJK language support
hasCJKLanguage = true
# default language
defaultContentLanguage = 'en'
# defaultContentLanguageInSubdir
defaultContentLanguageInSubdir = false

########################### Services #############################

########################## Permalinks ############################
[permalinks.page]
  "pages" = "/:slugorcontentbasename/"

########################## Pagination ############################
[pagination]
  disableAliases = false
  pagerSize = 10
  path = 'page'

############################ Build ##############################
[build]
[build.buildStats]
  enable = true
[[build.cachebusters]]
  source = 'assets/notwatching/hugo_stats\.json'
  target = 'css'

############################ Outputs ############################
[outputs]
  home     = ["HTML", "RSS", "WebAppManifest", "SearchIndex"]
  page     = ["HTML", "RSS"]
  section  = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term     = ["HTML", "RSS"]

############################ Imaging ############################
[imaging]
  quality = 80
  resampleFilter = "Lanczos"

############################ Caches ##############################
[caches]
[caches.images]
  dir = ":resourceDir/_gen"
  maxAge = "720h"

[caches.assets]
  dir = ":resourceDir/_gen"
  maxAge = "720h"

############################ Markup ##############################
[markup]
[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = 'monokai'
  lineNumbersInTable = false

[markup.tableOfContents]
  startLevel = 2
  endLevel = 5
  ordered = true

########################### Media types ###########################
[mediaTypes]
[mediaTypes."application/manifest+json"]
  suffixes = ["webmanifest"]

########################### Output Format ##########################
[outputFormats]
[outputFormats.WebAppManifest]
  mediaType = "application/manifest+json"
  rel = "manifest"

[outputFormats.SearchIndex]
  mediaType = "application/json"
  baseName = "searchindex"
  isPlainText = true
  notAlternative = true

############################ Plugins ##############################
# CSS Plugins
[[params.plugins.css]]
  link = "plugins/swiper/swiper-bundle.css"
  lazy = true
[[params.plugins.css]]
