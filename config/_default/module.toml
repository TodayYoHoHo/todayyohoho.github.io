[hugoVersion]
  extended = true
  min = "0.158.0"

[[module.mounts]]
  source = 'assets'
  target = 'assets'
[[module.mounts]]
  source = 'layouts'
  target = 'layouts'
[[module.mounts]]
  source = 'data'
  target = 'data'
[[module.mounts]]
  source = 'content'
  target = 'content'
[[module.mounts]]
  source = 'static'
  target = 'static'
[[module.mounts]]
  source = 'archetypes'
  target = 'archetypes'
[[module.mounts]]
  source = 'hugo_stats.json'
  target = 'assets/notwatching/hugo_stats.json'

[[imports]]
path = "hugoplate"
