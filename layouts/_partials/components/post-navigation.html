{{/* Post navigation */}}
<div class="flex justify-between items-center">
  {{ with .PrevInSection }}
    <a href="{{ .Permalink }}" class="btn btn-outline-primary btn-sm">
      <i class="fa fa-arrow-left mr-2"></i>{{ .Title }}
    </a>
  {{ else }}
    <span></span>
  {{ end }}
  {{ with .NextInSection }}
    <a href="{{ .Permalink }}" class="btn btn-outline-primary btn-sm">
      {{ .Title }}<i class="fa fa-arrow-right ml-2"></i>
    </a>
  {{ end }}
</div>
